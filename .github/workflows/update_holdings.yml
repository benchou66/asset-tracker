name: 每日個股現值更新

on:
  schedule:
    # 每天 15:30 台灣時間 (UTC+8) = UTC 07:30
    - cron: '30 7 * * 1-5'  # 週一到週五
  workflow_dispatch:  # 允許手動觸發

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests firebase-admin

      - name: Run update script
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/update_holdings.py

  notify-failure:
    runs-on: ubuntu-latest
    needs: update
    if: failure()

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "❌ Asset Tracker 每日更新失敗 - ${{ github.run_id }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.NOTIFY_EMAIL }}
          body: |
            Asset Tracker 每日股價更新腳本執行失敗！

            時間：${{ github.event.repository.updated_at }}
            執行 ID：${{ github.run_id }}

            請至 GitHub Actions 查看詳細錯誤：
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
